<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jazzy Vintage Weekly Planner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Special+Elite&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }

    .jroot {
      --bg:            #f5efe0;
      --paper:         #faf5e8;
      --deep:          #2b1d0e;
      --gold:          #c8941a;
      --gold-light:    #e8b84b;
      --border:        #8b6340;
      --border-strong: #4a2c0a;
      --muted:         #7a5c3a;
      --hover:         #ede0c4;
      --header:        #3b2210;
      --stripe:        #f0e6ce;
      --modal-ov:      rgba(30,15,5,0.55);
      --font-d: 'Playfair Display', Georgia, serif;
      --font-t: 'Special Elite', 'Courier New', monospace;
      --font-b: 'Libre Baskerville', Georgia, serif;
      background: var(--bg);
      padding: 1.4rem 1rem 1.2rem;
      font-family: var(--font-b);
      border-radius: 6px;
      transition: background 0.3s, color 0.3s;
    }
    .jroot.night {
      --bg:            #110b04;
      --paper:         #1c1108;
      --deep:          #f0ddb0;
      --gold:          #e8b84b;
      --gold-light:    #f5d080;
      --border:        #6a4520;
      --border-strong: #c8941a;
      --muted:         #b08060;
      --hover:         #2a1808;
      --header:        #c8941a;
      --stripe:        #17100505;
      --modal-ov:      rgba(0,0,0,0.72);
    }

    .masthead { text-align:center; margin-bottom:1rem; padding-bottom:0.6rem; border-bottom:3px double var(--border-strong); }
    .masthead h1 { font-family:var(--font-d); font-size:26px; font-weight:700; color:var(--deep); letter-spacing:0.04em; line-height:1.1; }
    .masthead .sub { font-family:var(--font-t); font-size:11px; color:var(--muted); letter-spacing:0.18em; margin-top:3px; }
    .masthead-rule { display:flex; align-items:center; gap:8px; margin:6px 0 0; color:var(--gold); font-size:13px; justify-content:center; }
    .masthead-rule span { flex:1; height:1px; background:var(--gold); max-width:80px; }

    .topbar { display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
    .topbar input, .topbar select { font-family:var(--font-t); font-size:12px; height:30px; padding:0 8px; border:1.5px solid var(--border); border-radius:2px; background:var(--paper); color:var(--deep); outline:none; }
    .topbar input[type="color"] { width:36px; padding:2px 3px; cursor:pointer; }
    .topbar input:focus, .topbar select:focus { border-color:var(--gold); }

    .jbtn { font-family:var(--font-t); font-size:12px; height:30px; padding:0 12px; border:1.5px solid var(--border); border-radius:2px; background:var(--paper); color:var(--deep); cursor:pointer; letter-spacing:0.05em; }
    .jbtn:hover { background:var(--hover); border-color:var(--border-strong); }
    .jbtn.gold { background:var(--gold); color:#2b1d0e; border-color:var(--border-strong); font-weight:700; }
    .jbtn.gold:hover { background:var(--gold-light); }
    .mode-btn { margin-left:auto; }

    .grid-outer { border:3px solid var(--border-strong); border-radius:3px; overflow:hidden; box-shadow:4px 4px 0 var(--border-strong); }
    .grid-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; min-width:580px; }

    th { font-family:var(--font-d); font-size:12px; font-weight:700; color:var(--paper); padding:8px 4px; background:var(--header); text-align:center; border-right:2px solid var(--border); border-bottom:3px solid var(--border-strong); letter-spacing:0.08em; }
    th:last-child { border-right:none; }
    th.time-col { width:52px; border-right:3px solid var(--border-strong); font-family:var(--font-t); font-size:10px; letter-spacing:0.1em; }

    td { border-right:2px solid var(--border); border-bottom:1.5px solid var(--border); vertical-align:top; padding:2px; height:50px; background:var(--paper); }
    tr:nth-child(even) td { background:var(--stripe); }
    tr:nth-child(even) td.time-cell { filter:brightness(0.93); }
    td:last-child { border-right:none; }
    tr:last-child td { border-bottom:none; }

    td.time-cell { font-family:var(--font-t); font-size:10px; color:var(--muted); text-align:right; padding:4px 6px; white-space:nowrap; background:color-mix(in srgb, var(--paper) 55%, var(--border) 45%); vertical-align:middle; border-right:3px solid var(--border-strong); letter-spacing:0.05em; }
    td.drop-zone { cursor:pointer; }
    td.drop-zone:hover { background:var(--hover); }
    td.drag-over { background:var(--hover); outline:2px dashed var(--gold); outline-offset:-2px; }
    td.copy-target { outline:2px dashed var(--gold); outline-offset:-2px; background:var(--hover); cursor:copy; }

    .task { border-radius:2px; padding:3px 6px; font-family:var(--font-t); font-size:11px; cursor:grab; user-select:none; position:relative; min-height:44px; display:flex; flex-direction:column; justify-content:center; overflow:hidden; border-left:3px solid rgba(0,0,0,0.25); border-top:1px solid rgba(255,255,255,0.25); }
    .task::before { content:''; position:absolute; top:0; right:0; border-style:solid; border-width:0 10px 10px 0; border-color:transparent rgba(0,0,0,0.18) transparent transparent; }
    .task:active { cursor:grabbing; }
    .task .task-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; letter-spacing:0.03em; }
    .task .task-cat-label { font-size:9px; opacity:0.75; letter-spacing:0.08em; margin-top:1px; }
    .task-actions { position:absolute; top:2px; right:3px; display:flex; gap:2px; opacity:0; }
    .task:hover .task-actions { opacity:1; }
    .task-btn { font-size:10px; cursor:pointer; background:rgba(0,0,0,0.22); border:none; color:inherit; font-weight:700; line-height:1; padding:2px 4px; border-radius:1px; font-family:var(--font-t); }
    .task-btn:hover { background:rgba(0,0,0,0.4); }
    .task-btn.copy-active { background:rgba(0,0,0,0.45); outline:1px solid rgba(255,255,255,0.5); }

    .copy-banner { display:none; align-items:center; justify-content:space-between; margin-bottom:10px; padding:8px 12px; background:var(--paper); border:1.5px dashed var(--gold); border-radius:2px; font-family:var(--font-t); font-size:11px; color:var(--deep); letter-spacing:0.06em; }
    .copy-banner.active { display:flex; }
    .copy-banner-cancel { cursor:pointer; color:var(--muted); font-size:12px; padding:2px 6px; border:1px solid var(--border); border-radius:2px; background:none; font-family:var(--font-t); }
    .copy-banner-cancel:hover { color:var(--deep); border-color:var(--border-strong); }

    .legend { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; padding:8px 10px; border:1px dashed var(--border); border-radius:2px; background:var(--paper); }
    .legend-label { font-family:var(--font-t); font-size:10px; color:var(--muted); letter-spacing:0.12em; margin-right:4px; align-self:center; }
    .legend-item { display:flex; align-items:center; gap:5px; }
    .legend-dot { width:12px; height:12px; border-radius:1px; flex-shrink:0; border:1px solid rgba(0,0,0,0.2); }
    .legend-name { font-family:var(--font-t); font-size:11px; color:var(--deep); }

    .modal-wrap { display:none; align-items:center; justify-content:center; min-height:240px; border-radius:3px; margin-top:12px; background:var(--modal-ov); border:2px solid var(--border-strong); }
    .modal-wrap.open { display:flex; }
    .modal { background:var(--paper); border-radius:2px; border:2px solid var(--border-strong); padding:1.25rem 1.5rem; width:300px; box-shadow:4px 4px 0 var(--border-strong); }
    .modal h3 { font-family:var(--font-d); font-size:16px; font-weight:700; color:var(--deep); margin-bottom:4px; border-bottom:2px double var(--border); padding-bottom:6px; }
    .modal .modal-sub { font-family:var(--font-t); font-size:10px; color:var(--muted); letter-spacing:0.12em; margin-bottom:14px; }
    .modal label { font-family:var(--font-t); font-size:11px; color:var(--muted); display:block; margin-bottom:3px; letter-spacing:0.1em; }
    .modal input, .modal select { width:100%; font-family:var(--font-t); font-size:12px; height:32px; padding:0 8px; border:1.5px solid var(--border); border-radius:2px; background:var(--bg); color:var(--deep); margin-bottom:12px; outline:none; }
    .modal input:focus, .modal select:focus { border-color:var(--gold); }
    .modal input[type="color"] { height:32px; padding:2px 3px; }
    .modal-btns { display:flex; gap:8px; justify-content:flex-end; margin-top:6px; }
    .modal-btns button { font-family:var(--font-t); font-size:12px; height:30px; padding:0 16px; border-radius:2px; cursor:pointer; border:1.5px solid var(--border); background:var(--bg); color:var(--deep); letter-spacing:0.05em; }
    .modal-btns button.primary { background:var(--gold); color:#2b1d0e; border-color:var(--border-strong); font-weight:700; }
    .modal-btns button:hover { border-color:var(--border-strong); background:var(--hover); }
    .modal-btns button.primary:hover { background:var(--gold-light); }

    .footer-strip { margin-top:10px; text-align:center; font-family:var(--font-t); font-size:10px; color:var(--muted); letter-spacing:0.14em; border-top:1px dashed var(--border); padding-top:8px; }
  </style>
</head>
<body>

<div class="jroot" id="jroot">

  <div class="masthead">
    <div class="sub">♩ ESTABLISHED FOR THE DISCERNING PLANNER ♩</div>
    <h1>Weekly Planner</h1>
    <div class="masthead-rule"><span></span>♫ &nbsp; ♫ &nbsp; ♫<span></span></div>
  </div>

  <div class="topbar">
    <select id="cat-select" style="width:110px"><option value="">— category —</option></select>
    <input type="text" id="new-cat" placeholder="New category..." style="width:118px">
    <input type="color" id="cat-color" value="#9e3d1f">
    <button class="jbtn gold" onclick="addCategory()">+ Add</button>
    <button class="jbtn" onclick="clearAll()">Clear all</button>
    <button class="jbtn mode-btn" id="mode-btn" onclick="toggleMode()">☽ Night</button>
  </div>

  <div class="copy-banner" id="copy-banner">
    <span id="copy-banner-text"></span>
    <button class="copy-banner-cancel" onclick="cancelCopy()">✕ Cancel</button>
  </div>

  <div class="grid-outer">
    <div class="grid-wrap"><table id="tt"></table></div>
  </div>

  <div class="legend" id="legend"><span class="legend-label">LEGEND —</span></div>

  <div class="modal-wrap" id="modal-wrap">
    <div class="modal">
      <h3 id="modal-title">Add task</h3>
      <div class="modal-sub" id="modal-sub"></div>
      <label>Task name</label>
      <input type="text" id="task-name" placeholder="e.g. Morning rehearsal">
      <label>Category</label>
      <select id="task-cat"></select>
      <div class="modal-btns">
        <button onclick="closeModal()">Cancel</button>
        <button class="primary" onclick="saveTask()">Save</button>
      </div>
    </div>
  </div>

  <div class="footer-strip">♩ &nbsp; CLICK TO ADD &nbsp; · &nbsp; DRAG TO MOVE &nbsp; · &nbsp; HOVER FOR OPTIONS &nbsp; · &nbsp; ⊕ TO DUPLICATE &nbsp; ♩</div>

</div>

<script>
  const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const HOURS = [];
  for (let h = 6; h <= 23; h++) HOURS.push(h);

  let isNight = false;
  let copySource = null;
  let categories = [
    { name: 'Performance', color: '#9e3d1f' },
    { name: 'Rehearsal',   color: '#1a6b6b' },
    { name: 'Study',       color: '#5c3d1e' },
    { name: 'Rest',        color: '#c8941a' },
  ];
  let tasks = {};
  let pendingCell = null;

  function toggleMode() {
    isNight = !isNight;
    document.getElementById('jroot').classList.toggle('night', isNight);
    document.getElementById('mode-btn').innerHTML = isNight ? '☀ Day' : '☽ Night';
  }

  function cellKey(d, h) { return `${d}-${h}`; }
  function hourLabel(h) { return h < 12 ? `${h}am` : h === 12 ? '12pm' : `${h - 12}pm`; }
  function textColor(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return (0.299*r + 0.587*g + 0.114*b) > 145 ? '#2b1d0e' : '#f5efe0';
  }

  function startCopy(day, hour) {
    copySource = { day, hour };
    const task = tasks[cellKey(day, hour)];
    document.getElementById('copy-banner-text').textContent = `Duplicating "${task.name}" — click any empty cell to place a copy`;
    document.getElementById('copy-banner').classList.add('active');
    buildTable();
  }

  function cancelCopy() {
    copySource = null;
    document.getElementById('copy-banner').classList.remove('active');
    buildTable();
  }

  function handleCellClick(day, hour) {
    if (copySource) {
      const dk = cellKey(day, hour);
      if (!tasks[dk]) {
        tasks[dk] = { ...tasks[cellKey(copySource.day, copySource.hour)] };
        cancelCopy();
      }
      return;
    }
    openAdd(day, hour);
  }

  function buildTable() {
    const tt = document.getElementById('tt');
    let html = '<thead><tr><th class="time-col">TIME</th>';
    DAYS.forEach(d => html += `<th>${d.toUpperCase()}</th>`);
    html += '</tr></thead><tbody>';
    HOURS.forEach(h => {
      html += `<tr><td class="time-cell">${hourLabel(h)}</td>`;
      DAYS.forEach(d => {
        const key = cellKey(d, h), task = tasks[key];
        const isSrc = copySource && copySource.day === d && copySource.hour === h;
        const isEmptyTarget = copySource && !task && !isSrc;
        if (task) {
          const cat = categories.find(c => c.name === task.cat) || { color: '#7a5c3a' };
          const tc = textColor(cat.color);
          html += `<td class="drop-zone${isSrc ? ' drag-over' : ''}" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="if(!${isSrc})this.classList.remove('drag-over')" ondrop="dropTask(event,'${d}',${h})">
            <div class="task" draggable="true" ondragstart="dragTask(event,'${d}',${h})" style="background:${cat.color};color:${tc}">
              <span class="task-name">${task.name}</span>
              <span class="task-cat-label">${task.cat.toUpperCase()}</span>
              <span class="task-actions">
                <button class="task-btn" onclick="openEdit('${d}',${h})" title="Edit">✎</button>
                <button class="task-btn${isSrc ? ' copy-active' : ''}" onclick="startCopy('${d}',${h})" title="Duplicate">⊕</button>
                <button class="task-btn" onclick="deleteTask('${d}',${h})" title="Delete">✕</button>
              </span>
            </div>
          </td>`;
        } else {
          html += `<td class="drop-zone${isEmptyTarget ? ' copy-target' : ''}" onclick="handleCellClick('${d}',${h})" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="dropTask(event,'${d}',${h})"></td>`;
        }
      });
      html += '</tr>';
    });
    html += '</tbody>';
    tt.innerHTML = html;
    buildLegend();
  }

  function buildLegend() {
    const el = document.getElementById('legend');
    const items = categories.map(c =>
      `<div class="legend-item"><div class="legend-dot" style="background:${c.color}"></div><span class="legend-name">${c.name}</span></div>`
    ).join('');
    el.innerHTML = `<span class="legend-label">LEGEND —</span>${items}`;
  }

  function updateCatSelects() {
    const opts = categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
    document.getElementById('cat-select').innerHTML = '<option value="">— category —</option>' + opts;
    document.getElementById('task-cat').innerHTML = opts;
  }

  function addCategory() {
    const name = document.getElementById('new-cat').value.trim();
    const color = document.getElementById('cat-color').value;
    if (!name || categories.find(c => c.name === name)) return;
    categories.push({ name, color });
    document.getElementById('new-cat').value = '';
    updateCatSelects();
    buildLegend();
  }

  function openAdd(day, hour) {
    pendingCell = { day, hour, editing: false };
    document.getElementById('task-name').value = '';
    document.getElementById('modal-title').textContent = 'Add task';
    document.getElementById('modal-sub').textContent = `${day.toUpperCase()} · ${hourLabel(hour)}`;
    updateCatSelects();
    document.getElementById('modal-wrap').classList.add('open');
    setTimeout(() => document.getElementById('task-name').focus(), 50);
    setTimeout(() => document.getElementById('modal-wrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 60);
  }

  function openEdit(day, hour) {
    const key = cellKey(day, hour), task = tasks[key];
    if (!task) return;
    pendingCell = { day, hour, editing: true };
    updateCatSelects();
    document.getElementById('task-name').value = task.name;
    document.getElementById('task-cat').value = task.cat;
    document.getElementById('modal-title').textContent = 'Edit task';
    document.getElementById('modal-sub').textContent = `${day.toUpperCase()} · ${hourLabel(hour)}`;
    document.getElementById('modal-wrap').classList.add('open');
    setTimeout(() => {
      const i = document.getElementById('task-name');
      i.focus();
      i.setSelectionRange(i.value.length, i.value.length);
    }, 50);
    setTimeout(() => document.getElementById('modal-wrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 60);
  }

  function closeModal() {
    document.getElementById('modal-wrap').classList.remove('open');
    pendingCell = null;
  }

  function saveTask() {
    if (!pendingCell) return;
    const name = document.getElementById('task-name').value.trim();
    const cat = document.getElementById('task-cat').value;
    if (!name) { document.getElementById('task-name').focus(); return; }
    tasks[cellKey(pendingCell.day, pendingCell.hour)] = { name, cat: cat || (categories[0] || { name: '' }).name };
    closeModal();
    buildTable();
  }

  function deleteTask(day, hour) {
    if (copySource && copySource.day === day && copySource.hour === hour) cancelCopy();
    delete tasks[cellKey(day, hour)];
    buildTable();
  }

  let dragSrc = null;
  function dragTask(ev, day, hour) { dragSrc = { day, hour }; ev.dataTransfer.effectAllowed = 'move'; }
  function dropTask(ev, day, hour) {
    ev.preventDefault();
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    if (copySource) { cancelCopy(); return; }
    if (!dragSrc) return;
    const sk = cellKey(dragSrc.day, dragSrc.hour), dk = cellKey(day, hour);
    if (sk === dk) { dragSrc = null; return; }
    const t = tasks[sk];
    if (t) { if (tasks[dk]) tasks[sk] = tasks[dk]; else delete tasks[sk]; tasks[dk] = t; }
    dragSrc = null;
    buildTable();
  }

  function clearAll() {
    if (confirm('Clear all tasks from the planner?')) { tasks = {}; cancelCopy(); buildTable(); }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { if (copySource) cancelCopy(); else closeModal(); }
  });
  document.getElementById('task-name').addEventListener('keydown', e => { if (e.key === 'Enter') saveTask(); });

  updateCatSelects();
  buildTable();
</script>

</body>
</html>
